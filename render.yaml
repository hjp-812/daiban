services:
  - type: web
    name: daiban-api
    runtime: image
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: daiban-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: daiban-redis
          type: redis
          property: connectionString

  - type: redis
    name: daiban-redis

databases:
  - name: daiban-db
    databaseName: todo_db
    user: postgres
