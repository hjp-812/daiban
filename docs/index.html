<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
  <script type="module" crossorigin src="/demo/assets/index-3mG4hJes.js"></script>
  <link rel="stylesheet" crossorigin href="/demo/assets/index-CsLGm9eO.css">
</head>
<body>
    <div id="app">
        <!-- 登录/注册界面 -->
        <div id="auth-panel" class="panel">
            <h1>Todo List</h1>
            <div class="tabs">
                <button class="tab active" data-tab="login">登录</button>
                <button class="tab" data-tab="register">注册</button>
            </div>

            <div id="login-form" class="form">
                <input type="text" id="login-username" placeholder="用户名" autocomplete="username">
                <input type="password" id="login-password" placeholder="密码" autocomplete="current-password">
                <button class="btn btn-primary" onclick="login()">登录</button>
            </div>

            <div id="register-form" class="form hidden">
                <input type="text" id="reg-username" placeholder="用户名" autocomplete="username">
                <input type="password" id="reg-password" placeholder="密码（至少6位）" autocomplete="new-password">
                <button class="btn btn-primary" onclick="register()">注册</button>
            </div>
        </div>

        <!-- 主界面 -->
        <div id="main-panel" class="panel hidden">
            <div class="header">
                <h1>我的待办</h1>
                <div class="header-right">
                    <span id="username-display"></span>
                    <button class="btn btn-sm" onclick="logout()">退出</button>
                </div>
            </div>

            <div class="stats">
                <span id="todo-count">未完成: --</span>
                <span id="cache-source"></span>
            </div>

            <div class="add-todo">
                <input type="text" id="todo-title" placeholder="新任务标题..." maxlength="200">
                <input type="text" id="todo-content" placeholder="详细描述（可选）...">
                <button class="btn btn-primary" onclick="addTodo()">添加</button>
            </div>

            <div id="todo-list"></div>
        </div>
    </div>

</body>
</html>
